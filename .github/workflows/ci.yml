name: CI Hospy

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    env:
      DJANGO_SECRET_KEY: ci-secret-key-minimum-32-characters-long
      DJANGO_DEBUG: "false"
      USE_SQLITE: "true"
      CELERY_TASK_ALWAYS_EAGER: "true"
      HOSPY_INTEGRATION_API_KEY: test-integration-key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Black (format check)
        run: black --check accounts bookings config properties reviews rooms conftest.py manage.py

      - name: Flake8
        run: flake8 accounts bookings config properties reviews rooms

      - name: Django check
        run: python manage.py check

      - name: Pytest
        run: pytest -q
