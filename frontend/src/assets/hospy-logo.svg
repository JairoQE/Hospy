<svg width="500" height="580" viewBox="0 0 500 580" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Logo Hospy</title>
  <desc>Logo oficial de Hospy  sistema de hoteles, hostales y hospedajes.</desc>

  <style>
    .logo-name    { font-family: Georgia, 'Times New Roman', serif; font-size: 86px; font-weight: 700; fill: #0F6E56; letter-spacing: -2px; }
    .logo-tagline { font-family: Arial, sans-serif; font-size: 18px; font-weight: 400; fill: #5F9E8A; letter-spacing: 3px; }
    .logo-sub     { font-family: Arial, sans-serif; font-size: 13px; fill: #8FBFB3; letter-spacing: 1.2px; }
  </style>

  <rect width="500" height="580" fill="#FFFFFF"/>

  <g transform="translate(178, 60)">
    <rect x="0" y="0" width="144" height="144" rx="32" fill="#1D9E75"/>
    <polygon points="72,20 128,64 16,64" fill="#0A5240"/>
    <line x1="72" y1="20" x2="72" y2="36" stroke="#E1F5EE" stroke-width="3" stroke-linecap="round"/>
    <rect x="22" y="64" width="100" height="64" rx="4" fill="#0F6E56"/>
    <rect x="32" y="76" width="28" height="24" rx="5" fill="#E1F5EE" opacity="0.95"/>
    <line x1="46" y1="76" x2="46" y2="100" stroke="#1D9E75" stroke-width="1.8"/>
    <line x1="32" y1="88" x2="60" y2="88" stroke="#1D9E75" stroke-width="1.8"/>
    <rect x="84" y="76" width="28" height="24" rx="5" fill="#E1F5EE" opacity="0.95"/>
    <line x1="98" y1="76" x2="98" y2="100" stroke="#1D9E75" stroke-width="1.8"/>
    <line x1="84" y1="88" x2="112" y2="88" stroke="#1D9E75" stroke-width="1.8"/>
    <path d="M58 128 L58 108 Q72 94 86 108 L86 128 Z" fill="#E1F5EE" opacity="0.9"/>
    <circle cx="82" cy="118" r="2.8" fill="#1D9E75"/>
    <line x1="14" y1="128" x2="130" y2="128" stroke="#E1F5EE" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
    <g transform="translate(116, 22)">
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#E1F5EE" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#E1F5EE" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#E1F5EE" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="#E1F5EE" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
    </g>
  </g>

  <text x="250" y="296" text-anchor="middle" class="logo-name">Hospy</text>
  <line x1="80" y1="320" x2="420" y2="320" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <text x="250" y="354" text-anchor="middle" class="logo-tagline">EVERY STAY, PERFECTLY PLACED</text>
  <text x="250" y="380" text-anchor="middle" class="logo-sub">Sistema de Hoteles, Hostales y Hospedajes</text>
  <circle cx="68" cy="354" r="3.5" fill="#1D9E75" opacity="0.3"/>
  <circle cx="57" cy="354" r="2.2" fill="#1D9E75" opacity="0.18"/>
  <circle cx="432" cy="354" r="3.5" fill="#1D9E75" opacity="0.3"/>
  <circle cx="443" cy="354" r="2.2" fill="#1D9E75" opacity="0.18"/>
</svg>
