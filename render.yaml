# Blueprint Render — backend Hospy (Docker + Gunicorn)
# Conecta el repo en https://dashboard.render.com → New → Blueprint
# Los secretos (POSTGRES_PASSWORD, CLOUDINARY_*, etc.) se configuran en el panel de Render.

services:
  - type: web
    name: hospy-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    # Pre-Deploy solo en plan de pago; en free las migraciones corren en scripts/render-start.sh
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "false"
      - key: POSTGRES_SSLMODE
        value: require
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
      - key: USE_CLOUDINARY
        value: "true"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
