  <!-- ── SUBTEXT ── -->
  <text x="340" y="322" text-anchor="middle" style="fill:rgb(90, 158, 142);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Sistema de Hoteles, Hostales y Hospedajes</text>

