    <text x="52" y="38" font-family="Arial, sans-serif" font-size="11" fill="#5F9E8A" letter-spacing="1.5" style="fill:rgb(95, 158, 138);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">HOSPEDAJES · HOTELES · HOSTALES</text>
