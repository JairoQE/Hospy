# Cloud Build → Artifact Registry → Cloud Run
# Uso: gcloud builds submit --config cloudbuild.yaml .
#
# Sustituciones (opcional):
#   gcloud builds submit --config cloudbuild.yaml . \
#     --substitutions=_REGION=southamerica-east1,_SERVICE=hospy-api

substitutions:
  _REGION: southamerica-east1
  _SERVICE: hospy-api
  _MIN_INSTANCES: "1"
  _MEMORY: 512Mi
  _CPU: "1"

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/hospy/${_SERVICE}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/hospy/${_SERVICE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/hospy/${_SERVICE}:$BUILD_ID

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/hospy/${_SERVICE}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/hospy/${_SERVICE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --min-instances=${_MIN_INSTANCES}
      - --max-instances=3
      - --memory=${_MEMORY}
      - --cpu=${_CPU}
      - --timeout=300
      - --concurrency=40

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/hospy/${_SERVICE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/hospy/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
